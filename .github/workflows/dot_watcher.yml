name: DoT Watcher

on:
  schedule:
    #          ┌─ min  ┌─ hour (UTC)
    #          │       │    → 09:00 IST every weekday
    - cron: '30 3 * * 1-5'

  workflow_dispatch:
    inputs:
      test_run:
        description: >
          Test run — scrapes 1 page per section, skips Supabase write,
          and does not commit changes back to the repo.
        type: boolean
        required: false
        default: false

# Never run two scrape jobs simultaneously (avoids CSV write conflicts)
concurrency:
  group: dot-watcher
  cancel-in-progress: false

jobs:
  scrape:
    name: ${{ inputs.test_run && '🧪 DoT Scrape (test)' || '🗂 DoT Scrape' }}
    runs-on: ubuntu-latest
    timeout-minutes: 60      # hard ceiling – site can be slow

    env:
      SUPABASE_URL:      ${{ secrets.SUPABASE_URL }}
      SUPABASE_KEY:      ${{ secrets.SUPABASE_KEY }}
      # Flip both knobs for test runs; empty / '0' / 'false' = full run
      DOT_MAX_PAGES:     ${{ inputs.test_run && '1' || '0' }}
      DOT_SKIP_SUPABASE: ${{ inputs.test_run && 'true' || 'false' }}

    steps:
      # ── repo ────────────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── Python ──────────────────────────────────────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          # Key changes only when the dep list in this file changes
          key: pip-dot-${{ runner.os }}-playwright-supabase
          restore-keys: pip-dot-${{ runner.os }}-

      - name: Install Python dependencies
        run: pip install playwright supabase

      # ── Playwright ──────────────────────────────────────────────────────────
      # Cache key is tied to the installed Playwright version so a pip
      # upgrade automatically busts the browser cache.
      - name: Get Playwright version
        id: pw-ver
        run: |
          echo "version=$(pip show playwright | grep ^Version | awk '{print $2}')" \
            >> "$GITHUB_OUTPUT"

      - name: Cache Playwright Chromium
        id: pw-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-${{ runner.os }}-${{ steps.pw-ver.outputs.version }}

      # Full install (browser binary + OS deps) on cache miss
      - name: Install Playwright Chromium (cache miss)
        if: steps.pw-cache.outputs.cache-hit != 'true'
        run: playwright install chromium --with-deps

      # On cache hit the binary is restored, but OS deps still need installing
      - name: Install Chromium OS deps (cache hit)
        if: steps.pw-cache.outputs.cache-hit == 'true'
        run: playwright install-deps chromium

      # ── run ─────────────────────────────────────────────────────────────────
      - name: Run DoT scraper
        run: python dot_watcher.py

      # ── artifacts ───────────────────────────────────────────────────────────
      # Always upload the JSON snapshot so you can inspect results
      - name: Upload new-items snapshot
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dot-new-${{ github.run_id }}
          path: dot/dot_new.json
          if-no-files-found: ignore
          retention-days: 14

      # Debug screenshots are only written when a page fails to load
      - name: Upload debug screenshots
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: dot-debug-${{ github.run_id }}
          path: dot/debug/
          if-no-files-found: ignore
          retention-days: 7

      # ── commit (full run only) ───────────────────────────────────────────────
      # Skipped entirely on test runs — nothing is written back to the repo.
      - name: Commit updated CSV + JSON
        if: ${{ !inputs.test_run }}
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add dot/dot_master.csv dot/dot_new.json

          if git diff --staged --quiet; then
            echo "ℹ️  No new DoT entries — nothing to commit"
          else
            COUNT=$(git diff --staged --numstat dot/dot_master.csv \
                    | awk '{print $1}')
            git commit -m "chore(dot): ${COUNT} new entries $(date -u +'%Y-%m-%d') [skip ci]"
            git push
          fi
